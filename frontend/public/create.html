<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Simulator — Nueva Banda</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-body">

  <header class="app-header">
    <div class="header-container" style="max-width: 48rem;">
      <div class="flex-group">
        <a href="index.html" class="slash" style="text-decoration:none; font-size:0.875rem;">← Volver</a>
        <span class="slash">/</span>
        <span class="app-title">Job Simulator</span>
        <span class="slash">/</span>
        <span class="app-subtitle" style="color: #94a3b8; text-transform:none;">Nueva Banda</span>
      </div>
    </div>
  </header>

  <main class="main-content" style="max-width: 48rem;">
    <div id="error" class="error-msg"></div>

    <div class="table-card" style="padding: 2rem;">
      <h1 style="font-size: 1.125rem; font-weight: 600; margin-top: 0; margin-bottom: 2rem;">Registrar nueva Banda / Artista</h1>

      <form id="form" novalidate style="display:flex; flex-direction:column; gap:1.5rem;">
        <div class="form-grid">

          <div class="form-group">
            <label class="form-label">Banda / Artista <span>string</span></label>
            <input name="campo1" type="text" required class="form-input" placeholder="Ej. The Beatles">
          </div>

          <div class="form-group">
            <label class="form-label">Género <span>string</span></label>
            <input name="campo2" type="text" required class="form-input" placeholder="Ej. Rock Clásico">
          </div>

          <div class="form-group">
            <label class="form-label">País <span>string</span></label>
            <input name="campo3" type="text" required class="form-input" placeholder="Ej. UK">
          </div>

          <div class="form-group">
            <label class="form-label">Año Inicio <span>integer</span></label>
            <input name="campo4" type="number" step="1" required class="form-input" placeholder="1960">
          </div>

          <div class="form-group">
            <label class="form-label">Rating <span>float</span></label>
            <input name="campo5" type="number" step="0.01" required class="form-input" placeholder="5.0">
          </div>

          <div class="form-group">
            <label class="form-label">Activa <span>boolean</span></label>
            <div style="display:flex; align-items:center; height: 2.5rem;">
              <input name="campo6" type="checkbox" style="width:1rem; height:1rem; cursor:pointer;">
            </div>
          </div>

        </div>

        <div class="form-actions">
          <button id="submit-btn" type="submit" class="btn-primary">
            Crear registro
          </button>
          <a href="index.html" class="btn-secondary">
            Cancelar
          </a>
        </div>
      </form>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script type="module" src="js/create.js"></script>
</body>
</html>
