<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Simulator - Bands</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-body">

  <header class="app-header">
    <div class="header-container">
      <div class="flex-group">
        <span class="app-title">Job Simulator</span>
        <span class="slash">/</span>
        <span class="app-subtitle" id="resource-label">bands</span>
      </div>
      <a href="create.html" class="btn-primary">
        + Nuevo registro
      </a>
    </div>
  </header>

  <main class="main-content">
    <div id="error" class="error-msg"></div>

    <div class="table-card">
      <div class="table-container">
        <table class="data-table">
          <thead>
            <tr class="table-head-row">
              <th class="table-heading">ID</th>
              <th class="table-heading">Banda / Artista</th>
              <th class="table-heading">Género</th>
              <th class="table-heading">País</th>
              <th class="table-heading">Año Inicio</th>
              <th class="table-heading">Rating</th>
              <th class="table-heading">Activa (Sí/No)</th>
              <th class="table-heading text-right">Acciones</th>
            </tr>
          </thead>
          <tbody id="records" class="table-body"></tbody>
        </table>
      </div>
      <div id="empty" class="empty-state">
        No hay registros en la base de datos.
        <a href="create.html" class="empty-link">Añadir tu primera banda.</a>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script type="module" src="js/index.js"></script>
</body>
</html>
