<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Simulator — Editar Banda</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-body">

  <header class="app-header">
    <div class="header-container max-w-md">
      <div class="flex-group">
        <a href="index.html" class="slash text-link">← Volver</a>
        <span class="slash">/</span>
        <span class="app-title">Job Simulator</span>
        <span class="slash">/</span>
        <span class="app-subtitle text-subtitle text-normal">Editar registro</span>
      </div>
    </div>
  </header>

  <main class="main-content max-w-md">
    <div id="error" class="error-msg"></div>

    <div class="table-card p-card">
      <h1 class="form-title">Editar registro</h1>

      <form id="form" novalidate class="form-wrapper">
        <div class="form-grid">

          <div class="form-group">
            <label class="form-label">Banda / Artista <span>string</span></label>
            <input name="campo1" type="text" required class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">Género <span>string</span></label>
            <input name="campo2" type="text" required class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">País <span>string</span></label>
            <input name="campo3" type="text" required class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">Año Inicio <span>integer</span></label>
            <input name="campo4" type="number" step="1" required class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">Rating <span>float</span></label>
            <input name="campo5" type="number" step="0.01" required class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">Activa <span>boolean</span></label>
            <div class="checkbox-wrapper">
              <input name="campo6" type="checkbox" class="checkbox-input">
            </div>
          </div>

        </div>

        <div class="form-actions">
          <button id="submit-btn" type="submit" class="btn-primary">
            Guardar cambios
          </button>
          <a href="index.html" class="btn-secondary">
            Cancelar
          </a>
        </div>
      </form>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script type="module" src="js/edit.js"></script>
</body>
</html>
